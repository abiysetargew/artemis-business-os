services:
  - type: web
    name: artemis-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: |
      npm install && npx prisma generate && npx nest build && \
      rm -rf public && mkdir -p public && cp -r ../mobile/build/web/* public/ && \
      echo "Flutter web bundle copied to public/ from mobile/build/web" && \
      ls -la public | head -10
    startCommand: npx prisma migrate deploy && node dist/main.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SEED_ON_BOOT
        value: "true"
