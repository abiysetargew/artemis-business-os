services:
  - type: web
    name: artemis-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: |
      npm install && npx prisma generate && npx nest build && \
      cd .. && \
      if [ ! -d "$HOME/flutter" ]; then
        echo "Installing Flutter..."
        curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.2-stable.tar.xz -o /tmp/flutter.tar.xz
        tar xf /tmp/flutter.tar.xz -C "$HOME"
        rm /tmp/flutter.tar.xz
      fi && \
      export PATH="$HOME/flutter/bin:$PATH" && \
      git config --global --add safe.directory "$HOME/flutter" && \
      export FLUTTER_SUPPRESS_ANALYTICS=true BOT=true && \
      cd mobile && \
      flutter config --no-analytics --no-cli-animations && \
      flutter precache --no-android --no-ios --no-windows --no-macos --no-linux --web && \
      flutter pub get && \
      flutter build web --release \
        --dart-define=API_BASE_URL=/api/v1 \
        --no-tree-shake-icons
    startCommand: npx prisma migrate deploy && node dist/main.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SEED_ON_BOOT
        value: "true"
